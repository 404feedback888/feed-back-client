<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }

  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background: linear-gradient(to bottom, #eef1f7, #d8dee9);">
  <div class="bg-white/90 backdrop-blur-sm p-8 rounded-xl shadow-md max-w-md w-full border border-gray-200">
    <h1 class="text-2xl font-semibold text-gray-800 text-center mb-3">Đăng nhập</h1>

    <form id="loginForm" class="space-y-5">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Tài khoản</label>
        <input id="username" name="username" type="text" required placeholder="Nhập tài khoản..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 text-gray-700 transition">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
        <input id="password" name="password" type="password" required placeholder="Nhập mật khẩu..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 text-gray-700 transition">
      </div>

      <p id="loginStatus" class="text-center text-sm text-red-600"></p>

      <button type="submit" class="w-full py-3 bg-gray-800 hover:bg-black text-white font-semibold rounded-lg transition duration-200 active:scale-95">Đăng nhập</button>
    </form>
  </div>

  <script src="ping.js" defer></script>
  <script src="login.js" defer></script>
</body>
</html>
