<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 FeedBack</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .nav-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
        }
        .nav-menu a {
            padding: 8px 16px;
            background-color: #666;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .nav-menu a:hover {
            background-color: #333;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4"
      style="background: linear-gradient(to bottom, #eef1f7, #d8dee9);">

    <div class="nav-menu" id="navMenu">
        <a href="login.html">Đăng nhập</a>
    </div>

    <div class="bg-white/90 backdrop-blur-sm p-8 rounded-xl shadow-md max-w-md w-full border border-gray-200">

        <h1 class="text-2xl font-semibold text-gray-800 text-center mb-3">
            Nhận xét và góp ý
        </h1>

        <p class="text-gray-500 text-[15px] leading-relaxed text-center mb-7">
            Hãy để lại ý kiến của bạn tại đây.
        </p>

        <form class="space-y-5" id="feedbackForm">

            <div>
                <label for="information" class="block text-sm font-medium text-gray-700 mb-2">
                    Thông tin
                </label>
                <input
                    type="text"
                    id="information"
                    required
                    placeholder="Nhập thông tin của bạn..."
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 text-gray-700 transition"
                >
            </div>

            <div>
                <label for="feedback" class="block text-sm font-medium text-gray-700 mb-2">
                    Nhận xét
                </label>
                <textarea
                    id="feedback"
                    rows="4"
                    required
                    placeholder="Nhập nhận xét của bạn..."
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 text-gray-700 resize-none transition"
                ></textarea>
            </div>

            <button
                type="submit"
                class="w-full py-3 bg-gray-800 hover:bg-black text-white font-semibold rounded-lg transition duration-200 active:scale-95 cursor-pointer">
                Gửi
            </button>

        </form>
    </div>

    <script src="index.js"></script>
</body>
</html>
