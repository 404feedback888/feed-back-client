<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đã gửi</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 20px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #000;
    }
  </style>
</head>

<body
class="min-h-screen flex items-center justify-center px-4"
style="background: linear-gradient(to bottom, #eef1f7, #d8dee9);">

  <div class="bg-white/90 backdrop-blur-sm p-8 rounded-xl shadow-md text-center max-w-md w-full border border-gray-200">


    <h1 class="text-2xl font-semibold text-gray-800 mb-3">
      Đã gửi thành công
    </h1>

    <p class="text-gray-500 text-[15px] leading-relaxed mb-7">
      Cảm ơn bạn đã dành thời gian gửi nhận xét và góp ý.
    </p>

    <div class="button-group">
      <a href="index.html" class="btn">Gửi thêm</a>
    </div>

  </div>

  <script src="ping.js" defer></script>
</body>
</html>
